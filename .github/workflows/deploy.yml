name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          GAS_URL: ${{ secrets.GAS_URL }}
          GAS_TOKEN: ${{ secrets.GAS_TOKEN }}
        run: |
          cat <<'PYEOF' > /tmp/gen.py
          import os, json
          url   = json.dumps(os.environ['GAS_URL'])
          token = json.dumps(os.environ['GAS_TOKEN'])
          with open('config.js', 'w') as f:
              f.write('/* CONFIG */\n')
              f.write('const GAS_URL   = ' + url   + ';\n')
              f.write('const GAS_TOKEN = ' + token + ';\n')
          PYEOF
          python3 /tmp/gen.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
